<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">📅</span>
      <span class="topbar-title">School Calendar</span>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-name"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
    </div>
  </header>

  <div class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-heading">What's what</div>
        <div class="legend-item"><span class="legend-dot dot-available"></span> I'm free / available</div>
        <div class="legend-item"><span class="legend-dot dot-camp"></span> Holiday camp booked</div>
        <div class="legend-item"><span class="legend-dot dot-playdate"></span> Playdate request</div>
        <div class="legend-item"><span class="legend-dot dot-away"></span> Away / holiday</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-heading">This month</div>
        <div class="stat-row">
          <div class="stat-card">
            <div>
              <div class="stat-label">Free days</div>
            </div>
            <div class="stat-value" id="stat-available">–</div>
          </div>
          <div class="stat-card">
            <div>
              <div class="stat-label">Camp bookings</div>
            </div>
            <div class="stat-value" id="stat-camps">–</div>
          </div>
          <div class="stat-card">
            <div>
              <div class="stat-label">Playdate requests</div>
            </div>
            <div class="stat-value" id="stat-playdates">–</div>
          </div>
          <div class="stat-card">
            <div>
              <div class="stat-label">Away / holiday</div>
            </div>
            <div class="stat-value" id="stat-away">–</div>
          </div>
        </div>
      </div>
      <div class="sidebar-section">
        <button class="btn btn-primary btn-full" id="add-event-sidebar">+ Add event</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="calendar-header">
        <div class="calendar-nav">
          <button class="btn btn-ghost btn-sm" id="prev-btn">‹</button>
          <span class="month-label" id="month-label"></span>
          <button class="btn btn-ghost btn-sm" id="next-btn">›</button>
          <button class="btn btn-ghost btn-sm" id="today-btn">Today</button>
        </div>
        <div class="view-tabs">
          <button class="view-tab active" data-view="month">Month</button>
          <button class="view-tab" data-view="list">List</button>
        </div>
      </div>

      <div id="calendar-view"></div>
      <div id="list-view" style="display:none"></div>
    </main>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn" title="Add event">+</button>

<!-- Add Event Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add to calendar</span>
      <button class="modal-close" id="close-add-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Type</label>
        <div class="type-selector">
          <button type="button" class="type-option" data-type="available">
            <span class="type-icon">🟢</span>I'm free
          </button>
          <button type="button" class="type-option" data-type="holiday_camp">
            <span class="type-icon">🏕️</span>Holiday camp
          </button>
          <button type="button" class="type-option" data-type="playdate">
            <span class="type-icon">🎉</span>Playdate
          </button>
          <button type="button" class="type-option" data-type="away">
            <span class="type-icon">✈️</span>Away
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="ev-title">Title</label>
        <input type="text" id="ev-title" placeholder="e.g. Football Camp, Free all day…">
      </div>
      <div class="form-group">
        <label for="ev-desc">Details <span class="hint">(optional)</span></label>
        <textarea id="ev-desc" placeholder="Any extra info…"></textarea>
      </div>
      <div style="display:flex; gap:12px;">
        <div class="form-group" style="flex:1">
          <label for="ev-start">From</label>
          <input type="date" id="ev-start">
        </div>
        <div class="form-group" style="flex:1">
          <label for="ev-end">To</label>
          <input type="date" id="ev-end">
        </div>
      </div>
      <div id="add-error" class="banner banner-error" style="display:none"></div>
      <button class="btn btn-primary btn-full" id="save-event-btn">Save</button>
    </div>
  </div>
</div>

<!-- RSVP / Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detail-title"></span>
      <button class="modal-close" id="close-detail-modal">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
